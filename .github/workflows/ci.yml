name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: backend / go test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: go build
        run: go build ./...

  frontend:
    name: frontend / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      # Keep this in sync with frontend/package.json#packageManager.
      # action-setup@v4 doesn't always auto-resolve packageManager when the
      # spec has no integrity hash — pinning explicitly avoids the flake.
      - uses: pnpm/action-setup@v4
        with:
          version: '10.12.4'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: install
        run: pnpm install --frozen-lockfile

      - name: test
        run: pnpm test

      - name: build
        run: pnpm build
