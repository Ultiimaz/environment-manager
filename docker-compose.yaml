version: '3.8'

services:
  # DNS Server - must start first
  coredns:
    image: coredns/coredns:latest
    container_name: env-coredns
    restart: unless-stopped
    volumes:
      - ./data/network/Corefile:/etc/coredns/Corefile:ro
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    networks:
      env-manager-net:
        ipv4_address: 172.21.0.2
    command: -conf /etc/coredns/Corefile

  # Reverse Proxy
  traefik:
    image: traefik:v3.0
    container_name: env-traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=${PROXY_NETWORK:-my-macvlan-net}"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8081:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      env-manager-net:
        ipv4_address: 172.21.0.3
      my-macvlan-net:
        ipv4_address: ${TRAEFIK_IP:-192.168.1.6}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${BASE_DOMAIN:-localhost}`)"
      - "traefik.http.routers.traefik.entrypoints=web"
      - "traefik.http.services.traefik.loadbalancer.server.port=8080"
      - "traefik.docker.network=${PROXY_NETWORK:-my-macvlan-net}"
    depends_on:
      - coredns

  # Environment Manager (this platform)
  manager:
    build: .
    image: environment-manager:latest
    container_name: env-manager
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/app/data
      - ~/.ssh:/root/.ssh:ro
    environment:
      - GIT_REMOTE=${GIT_REMOTE:-}
      - BASE_DOMAIN=${BASE_DOMAIN:-localhost}
      - TRAEFIK_IP=${TRAEFIK_IP:-192.168.1.6}
      - PROXY_NETWORK=${PROXY_NETWORK:-my-macvlan-net}
      - PORT=8080
    networks:
      - env-manager-net
      - my-macvlan-net
    dns:
      - 172.21.0.2
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.manager.rule=Host(`manager.${BASE_DOMAIN:-localhost}`)"
      - "traefik.http.routers.manager.entrypoints=web"
      - "traefik.http.services.manager.loadbalancer.server.port=8080"
      - "traefik.docker.network=${PROXY_NETWORK:-my-macvlan-net}"
    depends_on:
      - coredns
      - traefik

networks:
  env-manager-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
  my-macvlan-net:
    external: true
